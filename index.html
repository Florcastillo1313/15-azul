<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis 15 Años</title>
<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background: linear-gradient(#0b3d91,#5fa8ff);
color:white;
padding:40px;
}

.card{
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:20px;
max-width:500px;
margin:auto;
}

h1{
font-size:40px;
}

.flor{
font-size:30px;
}

#contador{
font-size:30px;
margin:20px 0;
}

button{
background:white;
color:#0b3d91;
border:none;
padding:15px 25px;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#e0e0e0;
}

</style>
</head>

<body>

<div class="card">

<div class="flor">🌸 🌼 🌸</div>

<h1>Mis 15 Años</h1>

<p>Te invito a celebrar una noche mágica</p>

<h2>Sábado 20 de Diciembre 2026</h2>

<p>Faltan:</p>

<div id="contador"></div>

<button onclick="window.open('https://maps.google.com')">
Ver ubicación
</button>

</div>

<script>

var fechaFiesta = new Date("Dec 20, 2026 21:00:00").getTime();

var x = setInterval(function() {

var ahora = new Date().getTime();
var distancia = fechaFiesta - ahora;

var dias = Math.floor(distancia / (1000 * 60 * 60 * 24));

document.getElementById("contador").innerHTML = dias + " días";

}, 1000);

</script>

</body>
</html>
